# remap prefix to Control + space
unbind-key C-b
set -g prefix C-Space

# quick switch between current/last window
bind-key Space last-window

# resize with window
setw -g aggressive-resize on

# set term type and support
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',tmux-256color:RGB'

# pass OSC 8 hyperlinks through to the outer terminal (kitty handles them)
set-option -as terminal-features ',*:hyperlinks'

# update the TERM variable of terminal emulator when creating a new session or attaching a existing session
set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM'

# renumber windows when one is closed
set -g renumber-windows on

# use vim keys in modes, but stick with emacs on tmux command line
set-option -g mode-keys vi
set-option -g status-keys emacs

# display tmux messages for a bit longer
set -g display-time 4000

# activity monitoring
set-option -g monitor-activity on
set-option -g activity-action other

set-option -g bell-action any
set-option -g visual-bell on

set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T' # window number,program name,active (or not)

# recommended by nvim
set-option -g focus-events on

# pass through Shift+Enter (CSI u) from kitty to inner programs
bind-key -n S-Enter send-keys "\e[13;2u"

# different keys for next/prev window
# vim tab keys switch between windows
unbind-key n
unbind-key l
bind t next-window
bind T previous-window

# vim-style copy
bind-key -T copy-mode-vi 'v' send -X begin-selection

# in a graphical environment, use system clipboard
if-shell "paste > /dev/null 2>&1" {
    # the `copy` and `paste` commands come from my scripts repo
    bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "copy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "copy"
    bind-key p run-shell "paste | tmux load-buffer - && tmux paste-buffer"
} {
    bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
    bind-key p paste-buffer
}

# default to incremental search, and search backward
# this is because cursor is often at the bottom of the screen when starting a search
bind-key -T copy-mode-vi / command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""

# status bar config
set-option -g status-justify left
set-option -g status-bg black
set-option -g status-fg white
set-option -g status-left-length 80

# distinguish between active and inactive panes
#   for inactive panes, use dimmer background, blue indicator
set -g pane-border-style bg=#292929,fg=blue
set -g window-style bg=#3a3a3a
set -g display-panes-colour blue

#   for active panes, use terminal default (usually totally black) and green indicator
set -g pane-active-border-style bg=terminal,fg=brightgreen
set -g window-active-style bg=terminal
set -g display-panes-active-colour brightgreen

# no pane status indicators
set -g pane-border-status off

# more sane pane creation
# splits inherit the current pane's cwd (default would be the session start dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# new windows open in $HOME, not the current pane's working directory
bind c new-window -c "$HOME"

# trying everything to make moving between panes easier
# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch panes using Alt-vim-keys without prefix
bind -n M-l select-pane -L
bind -n M-h select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# resize panes with Shift-Alt-arrows (holdable — no prefix needed)
bind -n M-S-Up    resize-pane -U 2
bind -n M-S-Down  resize-pane -D 2
bind -n M-S-Left  resize-pane -L 2
bind -n M-S-Right resize-pane -R 2

# vim movement keys switch between panes
bind-key l select-pane -L
bind-key h select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D

# swap current pane with the marked pane (mark with prefix + m)
bind-key S swap-pane -s '{marked}'

# jump to the marked pane
bind-key ` select-pane -t '{marked}'

# split above with a pager showing this pane's scrollback (q to close)
bind-key R run-shell 'f=$(mktemp); layout=$(tmux display -p "#{window_layout}"); tmux capture-pane -e -p -J -S - > "$f" && tmux split-window -b -v -l 70% "less -R +G $f; rm $f; tmux wait-for -S review-$$" && tmux run-shell -b "tmux wait-for review-$$; sleep 0.2; tmux select-layout \"$layout\""'

# open the Claude Code transcript for the session in this pane (side pane)
bind-key T run-shell '~/repos/dotfiles/tmux-open-transcript'

# esc key is usek to talk to vim, not tmux. stop trying to be helpful, tmux!
set escape-time 0

# style for window indicators in the status bar
set-option -g window-status-style bg=black
set-option -g window-status-current-style bg=#050814,fg=#efd091
set-option -g window-status-activity-style bg=black,fg=#ba7735
set-option -g window-status-bell-style fg=yellow

set -g status-left '#[fg=red]#H#[fg=green]:#[fg=white]#S #[fg=green]][#[default] #[fg=cyan]#{p30:#{=-30:#{s|$HOME|~|:pane_current_path}}}#[fg=green] ][#[default] '

# set -g status-right '#[fg=green]][#[fg=white] #T #[fg=green]][ #[fg=blue]%Y-%m-%d #[fg=white]%H:%M#[default]'
set -g status-right '#(~/repos/scripts/claude-sudo indicator)#{prefix_highlight} #[fg=red]#P #[fg=blue]%Y-%m-%d #[fg=white]%H:%M#[default]'
#set -g status-right '#[fg=green]]#[fg=red][#(~/bin/countdown.py)]#[fg=green][ #{prefix_highlight} #[fg=red]#P #[fg=blue]%Y-%m-%d #[fg=white]%H:%M#[default]'
set -g history-limit 8192

# force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# plugins:
# continuum/resurrect to save/restore sessions:
# https://github.com/tmux-plugins/tmux-resurrect
# https://github.com/tmux-plugins/tmux-continuum
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# save scrollback of every pane so we can see what was running
set -g @resurrect-capture-pane-contents 'on'

# auto-restore last saved environment on fresh tmux server start (post-crash recovery)
set -g @continuum-restore 'on'

# save every 5 minutes instead of the 15-minute default
set -g @continuum-save-interval '5'

# prefix highlighting shows when the prefix key is pressed
# https://github.com/tmux-plugins/tmux-prefix-highlight
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# enable showing copy/sync mode
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=white,bg=blue' # default is 'fg=default,bg=yellow'
set -g @prefix_highlight_copy_prompt 'CP'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_empty_prompt '    '  # 4 spaces is how much we get!

# tmux plugin system
# auto-installation tip from here:
# https://github.com/tmux-plugins/tpm/blob/master/docs/automatic_tpm_installation.md
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
